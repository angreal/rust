version = 1

[install]
rustup.pkg-path = "rustup"
mdbook.pkg-path = "mdbook"
mkdocs-material.pkg-path = "python312Packages.mkdocs-material"

[hook]
on-activate = '''
  rustup toolchain install {{ rust_version }} 2>/dev/null
  rustup default {{ rust_version }} 2>/dev/null
  if ! command -v plissken &>/dev/null; then
    echo "Installing plissken..."
    cargo install plissken 2>/dev/null
  fi
'''

[profile]

[services]

