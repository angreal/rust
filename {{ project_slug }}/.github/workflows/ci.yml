name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust {{ rust_version }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "{{ rust_version }}"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Cargo check
        run: cargo check --workspace

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust {{ rust_version }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "{{ rust_version }}"

      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --workspace --lib -- --test-threads=1

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust {{ rust_version }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "{{ rust_version }}"

      - uses: Swatinem/rust-cache@v2

      - name: Run integration tests
        run: cargo test --workspace --test integration -- --test-threads=1

  test-functional:
    name: Functional Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust {{ rust_version }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "{{ rust_version }}"

      - uses: Swatinem/rust-cache@v2

      - name: Run functional tests
        run: cargo test --workspace --test functional -- --test-threads=1

      - name: Run ignored tests (external services)
        run: cargo test --workspace --test functional -- --test-threads=1 --ignored
        continue-on-error: true

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, test-functional]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust {{ rust_version }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "{{ rust_version }}"
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: |
          cargo llvm-cov --workspace --no-report -- --test-threads=1
          cargo llvm-cov report --workspace --html --output-dir coverage/
          cargo llvm-cov report --workspace --lcov --output-path coverage/lcov.info
          cargo llvm-cov report --workspace

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build (${{ '{{' }} matrix.os {{ '}}' }})
    runs-on: ${{ '{{' }} matrix.os {{ '}}' }}
    needs: check
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust {{ rust_version }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "{{ rust_version }}"

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release
